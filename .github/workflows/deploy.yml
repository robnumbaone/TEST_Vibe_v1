name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_ENV: production

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      # TODO: Aggiungi qui il tuo deploy (Vercel, AWS, Heroku, etc.)

      - name: Deploy to Vercel (example)
        # Uncomment e configura se usi Vercel
        # uses: amondnet/vercel-action@v25
        # with:
        #   vercel-token: ${{ secrets.VERCEL_TOKEN }}
        #   github-token: ${{ secrets.GITHUB_TOKEN }}
        #   vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        #   vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        run: echo "Deploy step - configure based on your platform"

      - name: Notify Slack (optional)
        if: always()
        # Uncomment se usi Slack
        # uses: slackapi/slack-github-action@v1
        # with:
        #   webhook-url: ${{ secrets.SLACK_WEBHOOK }}
        run: echo "Deploy completed"

      - name: Create Deployment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              required_contexts: [],
              auto_merge: false
            })
